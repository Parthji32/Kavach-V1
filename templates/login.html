<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KAVACH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e5e7eb;
            background: linear-gradient(135deg, #0a0a14 0%, #12101f 50%, #1a1533 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.1;
            pointer-events: none;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: #7c3aed;
            top: -200px;
            right: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #06b6d4;
            bottom: 100px;
            left: -200px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #9ca3af;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #e5e7eb;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(29, 26, 48, 0.6);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 0.5rem;
            color: #e5e7eb;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(29, 26, 48, 0.8);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        input::placeholder {
            color: #6b7280;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
        }

        .remember-forgot input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
        }

        .remember-forgot a {
            color: #7c3aed;
            text-decoration: none;
            transition: color 0.2s;
        }

        .remember-forgot a:hover {
            color: #8b5cf6;
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #9ca3af;
        }

        .signup-link a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .signup-link a:hover {
            color: #8b5cf6;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: #4b5563;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(124, 58, 237, 0.2);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="header">
            <div class="logo">⚔️</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your KAVACH dashboard</p>
        </div>

        <form class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" name="remember">
                    Remember me
                </label>
                <a href="#forgot">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>

            <div class="divider">
                <span>OR</span>
            </div>

            <button type="button" style="width: 100%; padding: 0.875rem; background: rgba(124, 58, 237, 0.1); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 0.5rem; color: #e5e7eb; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.2s;" onclick="alert('GitHub OAuth coming soon')">
                🔗 Sign in with GitHub
            </button>

            <div class="signup-link">
                Don't have an account? <a href="/signup">Create one free</a>
            </div>
        </form>
    </div>

    <script>
        document.querySelector('.login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Demo: Login would process here. Redirecting to dashboard...');
            window.location.href = '/app';
        });
    </script>
</body>
</html>
