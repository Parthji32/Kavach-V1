{{define "content"}}
<div class="flex flex-wrap items-center gap-3 mb-6">
    <a href="/tokens/{{.Token.ID}}" class="text-gray-400 hover:text-white transition">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
    </a>
    <h1 class="text-2xl font-semibold text-white">Edit Token</h1>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium
        {{if eq .Token.Type "url"}}bg-blue-500/15 text-blue-400
        {{else if eq .Token.Type "document"}}bg-purple-500/15 text-purple-400
        {{else if eq .Token.Type "api_key"}}bg-amber-500/15 text-amber-400
        {{else if eq .Token.Type "dns"}}bg-kavach-accent/15 text-kavach-accent
        {{else if eq .Token.Type "email"}}bg-pink-500/15 text-pink-400
        {{else if eq .Token.Type "qr_code"}}bg-teal-500/15 text-teal-400
        {{else if eq .Token.Type "cloned_site"}}bg-indigo-500/15 text-indigo-400
        {{else if eq .Token.Type "web_image"}}bg-rose-500/15 text-rose-400
        {{else if eq .Token.Type "aws_key"}}bg-orange-500/15 text-orange-400
        {{else}}bg-gray-500/15 text-gray-400{{end}}">
        {{.Token.Type}}
    </span>
</div>

<div class="max-w-2xl">
    <form id="edit-token-form" hx-put="/api/v1/tokens/{{.Token.ID}}" hx-target="#edit-result" hx-swap="innerHTML" hx-disabled-elt="find button[type=submit]">
        <div class="bg-kavach-darker border border-kavach-border rounded-xl p-6 space-y-5">
            <!-- Token Name -->
            <div>
                <label for="name" class="block text-xs font-medium text-gray-400 mb-1.5">Token Name</label>
                <input type="text" id="name" name="name" value="{{.Token.Name}}" required
                    class="w-full bg-kavach-dark border border-kavach-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-kavach-accent focus:ring-1 focus:ring-kavach-accent/50 outline-none transition"
                    placeholder="e.g., production-db-key">
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-xs font-medium text-gray-400 mb-1.5">Description</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full bg-kavach-dark border border-kavach-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-kavach-accent focus:ring-1 focus:ring-kavach-accent/50 outline-none transition resize-none"
                    placeholder="Where was this token deployed? What should it detect?">{{.Token.Description}}</textarea>
            </div>

            <!-- Active Toggle -->
            <div class="flex items-center justify-between p-4 bg-kavach-dark rounded-lg border border-kavach-border">
                <div>
                    <p class="text-sm text-white font-medium">Token Active</p>
                    <p class="text-xs text-gray-500 mt-0.5">When inactive, this token won't generate alerts when triggered</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_active" value="true" {{if .Token.IsActive}}checked{{end}} class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-gray-400 after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-kavach-accent peer-checked:after:bg-white"></div>
                </label>
            </div>

            <!-- Submit -->
            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                    class="flex items-center gap-2 bg-kavach-accent hover:bg-kavach-accent-hover text-kavach-dark px-5 py-2.5 rounded-lg text-sm font-semibold transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                    Save Changes
                </button>
                <a href="/tokens/{{.Token.ID}}" class="text-sm text-gray-400 hover:text-white transition">Cancel</a>
            </div>
        </div>
    </form>

    <!-- Result container for HTMX response -->
    <div id="edit-result" class="mt-4"></div>
</div>
{{end}}
