<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevent FOUC while Tailwind loads -->
    <style>body{opacity:0;transition:opacity 0.1s}body.loaded{opacity:1}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Kavach</title>
    
    <!-- Tailwind CSS (CDN for dev, build for production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kavach: {
                            dark: '#0A0A14',
                            darker: '#0D0B1A',
                            surface: '#12101F',
                            accent: '#7C3AED',
                            'accent-hover': '#8B5CF6',
                            cyan: '#06B6D4',
                            border: '#1E1A30',
                        }
                    }
                }
            }
        }
    </script>

    <!-- HTMX (dynamic UI without writing JavaScript) -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Custom styles -->
    <style>
        body { background-color: #0A0A14; overflow-x: hidden; }

        /* Sidebar transitions */
        .sidebar {
            width: 64px;
            transition: width 0.2s ease;
        }
        .sidebar:hover, .sidebar.expanded, .sidebar.pinned {
            width: 224px;
            transition-delay: 0.15s;
        }
        .sidebar .nav-label,
        .sidebar .logo-text,
        .sidebar .user-info {
            opacity: 0;
            white-space: nowrap;
            transition: opacity 0.15s ease;
        }
        .sidebar:hover .nav-label,
        .sidebar:hover .logo-text,
        .sidebar:hover .user-info,
        .sidebar.expanded .nav-label,
        .sidebar.expanded .logo-text,
        .sidebar.expanded .user-info {
            opacity: 1;
        }

        /* Active nav item */
        .nav-item.active { 
            border-right: 2px solid #7C3AED; 
            background: rgba(124, 58, 237, 0.08); 
            color: #C084FC; 
        }
        .nav-item:hover { background: rgba(124, 58, 237, 0.04); color: #E2E8F0; }

        /* Mobile overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 40;
        }
        .sidebar-overlay.active { display: block; }

        /* Mobile: sidebar slides from left */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -224px;
                width: 224px;
                z-index: 50;
                transition: left 0.2s ease;
            }
            .sidebar:hover {
                width: 224px;
                left: -224px;
            }
            .sidebar.expanded {
                left: 0;
            }
            .sidebar.expanded .nav-label,
            .sidebar.expanded .logo-text,
            .sidebar.expanded .user-info {
                opacity: 1;
            }
            .main-content {
                margin-left: 0 !important;
            }
        }

        /* Desktop: content shifts */
        @media (min-width: 769px) {
            .main-content {
                margin-left: 64px;
                transition: margin-left 0.2s ease;
            }
            .sidebar:hover ~ .main-content {
                margin-left: 224px;
            }
        }

        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-dot { animation: pulse-dot 2s infinite; }

        /* Hide page-level header on mobile (shown in fixed header bar instead) */
        @media (max-width: 768px) {
            .page-header { display: none; }
        }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }

        /* Gradient text utility */
        .gradient-text { 
            background: linear-gradient(135deg, #7C3AED, #06B6D4); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        /* Cards */
        .kavach-card {
            background: #0D0B1A;
            border: 1px solid rgba(124, 58, 237, 0.08);
            border-radius: 12px;
        }
        .kavach-card:hover { border-color: rgba(124, 58, 237, 0.15); }
        /* Buttons */
        .btn-kavach {
            background: linear-gradient(135deg, #7C3AED, #06B6D4);
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 20px;
            transition: all 0.2s;
        }
        .btn-kavach:hover {
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.25);
            transform: translateY(-1px);
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A0A14; }
        ::-webkit-scrollbar-thumb { background: #1E1A30; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #2A2540; }
    </style>
</head>
<body class="text-gray-300 min-h-screen">

    <!-- Mobile fixed header bar -->
    <header id="mobile-header" class="md:hidden fixed top-0 left-0 right-0 z-50 flex items-center gap-3 px-4 py-3 bg-kavach-darker/95 backdrop-blur-md border-b border-kavach-border">
        <button id="sidebar-toggle" class="w-9 h-9 flex items-center justify-center rounded-lg bg-kavach-dark border border-kavach-border text-gray-400 hover:text-white shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <h2 class="text-base font-semibold text-white truncate flex-1">{{.Title}}</h2>
        <a href="/tokens/new" class="btn-kavach text-xs px-3 py-1.5 shrink-0">+ New</a>
    </header>

    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar bg-kavach-darker border-r border-kavach-border flex flex-col fixed h-full z-50">
        <!-- Logo — links to landing page -->
        <a href="/" class="flex items-center gap-3 px-4 py-5 border-b border-kavach-border hover:bg-white/[0.02] transition">
            <span class="text-xl font-bold gradient-text shrink-0">⬡</span>
            <span class="logo-text">
                <span class="text-lg font-bold gradient-text">Kavach</span>
                <p class="text-[10px] text-gray-500">Armor that fights back</p>
            </span>
        </a>

        <!-- Navigation -->
        <nav class="flex-1 py-4 overflow-y-auto">
            <p class="px-4 text-[10px] uppercase tracking-widest text-gray-600 mb-2 nav-label">Main</p>
            
            <a href="/app" class="nav-item flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "dashboard"}}active{{end}}" title="Dashboard">
                <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/></svg>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="/tokens" class="nav-item flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "tokens"}}active{{end}}" title="Tokens">
                <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
                <span class="nav-label">Tokens</span>
            </a>
            <a href="/alerts" class="nav-item flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "alerts"}}active{{end}}" title="Alerts">
                <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6z"/></svg>
                <span class="nav-label">Alerts</span>
                {{if gt .AlertCount 0}}
                <span class="ml-auto bg-red-500/20 text-red-400 text-[10px] font-medium px-1.5 py-0.5 rounded-full">{{.AlertCount}}</span>
                {{end}}
            </a>
            <a href="/attackers" class="nav-item flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "attackers"}}active{{end}}" title="Attackers">
                <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                <span class="nav-label">Attackers</span>
            </a>

            <p class="px-4 text-[10px] uppercase tracking-widest text-gray-600 mb-2 mt-6 nav-label">Settings</p>
            <a href="/integrations" class="nav-item flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "integrations"}}active{{end}}" title="Integrations">
                <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
                <span class="nav-label">Integrations</span>
            </a>
            <a href="/settings" class="nav-item flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "settings"}}active{{end}}" title="Settings">
                <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
                <span class="nav-label">Settings</span>
            </a>
        </nav>

        <!-- User info -->
        <div class="px-4 py-4 border-t border-kavach-border">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-kavach-accent/20 flex items-center justify-center text-purple-400 text-xs font-bold shrink-0">PJ</div>
                <div class="user-info">
                    <p class="text-sm text-gray-300 font-medium">Parth Jindal</p>
                    <p class="text-[10px] text-gray-500">Free Plan</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content flex-1 px-4 pt-16 pb-4 md:pt-8 md:px-8 md:pb-8 min-h-screen">
        {{template "content" .}}
    </main>

    <!-- App JavaScript -->
    <script src="/static/js/app.js"></script>

    <!-- Sidebar toggle logic -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const toggle = document.getElementById('sidebar-toggle');

        // Mobile: toggle sidebar on hamburger click
        if (toggle) {
            toggle.addEventListener('click', function() {
                sidebar.classList.toggle('expanded');
                overlay.classList.toggle('active');
            });
        }

        function closeSidebar() {
            sidebar.classList.remove('expanded');
            overlay.classList.remove('active');
        }

        // Desktop: pin sidebar open on click (toggle between collapsed/expanded)
        if (window.innerWidth >= 769) {
            sidebar.addEventListener('click', function(e) {
                // Don't pin if clicking a link
                if (e.target.closest('a')) return;
                sidebar.classList.toggle('expanded');
            });
        }

        // Close mobile sidebar on link click
        sidebar.querySelectorAll('a').forEach(function(link) {
            link.addEventListener('click', function() {
                if (window.innerWidth < 769) {
                    closeSidebar();
                }
            });
        });
    </script>

<script>document.body.classList.add('loaded')</script>
</body>
</html>
