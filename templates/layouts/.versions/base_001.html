<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Kavach</title>
    
    <!-- Tailwind CSS (CDN for dev, build for production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kavach: {
                            dark: '#0A1628',
                            darker: '#0F1D32',
                            accent: '#00D4AA',
                            'accent-hover': '#00E8BB',
                            border: '#1E3A5F',
                        }
                    }
                }
            }
        }
    </script>

    <!-- HTMX (dynamic UI without writing JavaScript) -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Custom styles -->
    <style>
        body { background-color: #0A1628; }
        .nav-item.active { border-right: 2px solid #00D4AA; background: rgba(0, 212, 170, 0.08); color: #00D4AA; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.03); color: #E2E8F0; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-dot { animation: pulse-dot 2s infinite; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-56 bg-kavach-darker border-r border-kavach-border flex flex-col fixed h-full">
        <!-- Logo -->
        <div class="px-5 py-5 border-b border-kavach-border">
            <h1 class="text-xl font-bold text-kavach-accent tracking-tight">Kavach</h1>
            <p class="text-xs text-gray-500 mt-0.5">Armor that fights back</p>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-4">
            <p class="px-5 text-[10px] uppercase tracking-widest text-gray-600 mb-2">Main</p>
            
            <a href="/" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "dashboard"}}active{{end}}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/></svg>
                Dashboard
            </a>
            <a href="/tokens" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "tokens"}}active{{end}}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
                Tokens
            </a>
            <a href="/alerts" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "alerts"}}active{{end}}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6z"/></svg>
                Alerts
                {{if gt .AlertCount 0}}
                <span class="ml-auto bg-red-500/20 text-red-400 text-[10px] font-medium px-1.5 py-0.5 rounded-full">{{.AlertCount}}</span>
                {{end}}
            </a>
            <a href="/attackers" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "attackers"}}active{{end}}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                Attackers
            </a>

            <p class="px-5 text-[10px] uppercase tracking-widest text-gray-600 mb-2 mt-6">Settings</p>
            <a href="/integrations" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "integrations"}}active{{end}}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg>
                Integrations
            </a>
            <a href="/settings" class="nav-item flex items-center gap-3 px-5 py-2.5 text-sm text-gray-400 transition-all {{if eq .ActiveNav "settings"}}active{{end}}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
                Settings
            </a>
        </nav>

        <!-- User info -->
        <div class="px-5 py-4 border-t border-kavach-border">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-kavach-accent/20 flex items-center justify-center text-kavach-accent text-xs font-bold">PJ</div>
                <div>
                    <p class="text-sm text-gray-300 font-medium">Parth Jindal</p>
                    <p class="text-[10px] text-gray-500">Free Plan</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-56 flex-1 p-8">
        {{template "content" .}}
    </main>

</body>
</html>
