{{define "content"}}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-kavach-accent">Kavach</h1>
            <p class="text-gray-500 mt-1">Armor that fights back</p>
        </div>

        <div class="bg-kavach-darker border border-kavach-border rounded-xl p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Sign in to your account</h2>

            <form hx-post="/api/v1/auth/login" hx-target="#auth-result" hx-swap="innerHTML" hx-disabled-elt="find button[type=submit]">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
                        <input type="email" name="email" required
                            placeholder="you@company.com"
                            class="w-full bg-kavach-dark border border-kavach-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-kavach-accent focus:ring-1 focus:ring-kavach-accent/50 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                        <input type="password" name="credential" required
                            placeholder="Enter your password"
                            class="w-full bg-kavach-dark border border-kavach-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:border-kavach-accent focus:ring-1 focus:ring-kavach-accent/50 outline-none transition">
                    </div>
                </div>

                <button type="submit" class="w-full mt-6 bg-kavach-accent hover:bg-kavach-accent-hover text-kavach-dark py-2.5 rounded-lg text-sm font-semibold transition">
                    Sign In
                </button>

                <div id="auth-result" class="mt-4"></div>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                No account yet?
                <a href="/signup" class="text-kavach-accent hover:text-kavach-accent-hover transition">Create one</a>
            </p>
        </div>

        <p class="text-center text-xs text-gray-600 mt-6">
            Running in demo mode - no database required
        </p>
    </div>
</div>
{{end}}
