version: '3.8'

services:
  kavach:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_PATH: /app/data/kavach.db
      JWT_SECRET: your-secret-key-here
      ENVIRONMENT: production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: PostgreSQL (for future use)
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: kavach
  #     POSTGRES_PASSWORD: your-password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  postgres_data:
